services:
  intelligence_api:
    image: veltrus-intelligence:latest
    networks:
      - emeverton
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - QDRANT_HOST=intelligence_qdrant
      - QDRANT_PORT=6333
      - NATS_URL=nats://intelligence_nats:4222
      - GRAPH_DB_URL=postgresql://graphuser:${GRAPH_DB_PASSWORD}@intelligence_graphdb:5432/revenue_graph
      - VASTAI_API_KEY=${VASTAI_API_KEY}
      - VASTAI_OFFER_ID=${VASTAI_OFFER_ID:-0}
      - HF_TOKEN=${HF_TOKEN}
      - GPU_INFERENCE_IMAGE=${GPU_INFERENCE_IMAGE:-veltrus-intelligence-gpu:latest}
      - DEBUG=false
      - SHOPIFY_WEBHOOK_SECRET=${SHOPIFY_WEBHOOK_SECRET:-}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      resources:
        limits:
          memory: 1536M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.intelligence.rule=Host(`intelligence.ehos.com.br`)"
        - "traefik.http.routers.intelligence.entrypoints=websecure"
        - "traefik.http.routers.intelligence.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.intelligence.service=intelligence"
        - "traefik.http.services.intelligence.loadbalancer.server.port=8001"
        - "traefik.http.services.intelligence.loadbalancer.passHostHeader=1"

  intelligence_qdrant:
    image: qdrant/qdrant:v1.11.5
    networks:
      - emeverton
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M

  intelligence_nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    networks:
      - emeverton
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 128M

  intelligence_graphdb:
    image: veltrus-intelligence-graphdb:latest
    networks:
      - emeverton
    volumes:
      - graphdb_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=revenue_graph
      - POSTGRES_USER=graphuser
      - POSTGRES_PASSWORD=${GRAPH_DB_PASSWORD}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M

networks:
  emeverton:
    external: true

volumes:
  qdrant_data:
  graphdb_data:
